name: Generate Blog Images

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which posts to process"
        type: choice
        required: true
        default: missing
        options:
          - missing
          - all
          - single
      blog_file:
        description: "Single Markdown file, used when mode is single. Example: blog/AI-Governance-Protects-Velocity.md"
        type: string
        required: false
      force:
        description: "Regenerate existing images"
        type: boolean
        required: true
        default: false
  push:
    branches: [main]
    paths:
      - 'blog/**.md'
      - 'scripts/generate-og-image.mjs'

jobs:
  generate-blog-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Find markdown files to process
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            BLOG_FILE="${{ inputs.blog_file }}"
            FORCE="${{ inputs.force }}"

            if [ "$MODE" = "single" ]; then
              if [ -z "$BLOG_FILE" ]; then
                echo "mode=single requires blog_file" >&2
                exit 1
              fi
              if [ ! -f "$BLOG_FILE" ]; then
                echo "Blog file not found: $BLOG_FILE" >&2
                exit 1
              fi
              FILES="$BLOG_FILE"
            elif [ "$MODE" = "all" ] || [ "$FORCE" = "true" ]; then
              FILES=$(find blog -name '*.md' | sort | tr '\n' ' ' | xargs)
            else
              FILES=$(find blog -name '*.md' | sort | while read f; do
                slug=$(basename "${f%.md}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
                dir="public/images/blog/$slug"
                if [ ! -f "$dir/hero.png" ] || [ ! -f "$dir/card.png" ] || [ ! -f "$dir/social.png" ]; then
                  echo "$f"
                fi
              done | tr '\n' ' ' | xargs)
            fi
          else
            FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD 2>/dev/null \
              | grep -E '^blog/.*\.md$' \
              || git show --name-only --pretty=format: HEAD | grep -E '^blog/.*\.md$')
            FILES=$(echo "$FILES" | tr '\n' ' ' | xargs)
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Detected: $FILES"

      - name: Generate OG images
        if: steps.changed.outputs.files != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node scripts/generate-og-image.mjs $FORCE_FLAG ${{ steps.changed.outputs.files }}

      - name: Commit generated images
        if: steps.changed.outputs.files != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/blog
          git diff --cached --quiet || git commit -m "chore: generate blog images"
          git push
