name: Generate OG Image for Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'blog/**.md'

jobs:
  generate-og-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generation dependencies
        run: npm install openai sharp

      - name: Find new or modified markdown files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD 2>/dev/null \
            | grep -E '^blog/.*\.md$' \
            || git show --name-only --pretty=format: HEAD | grep -E '^blog/.*\.md$')
          FILES=$(echo "$FILES" | tr '\n' ' ' | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Detected: $FILES"

      - name: Generate OG images
        if: steps.changed.outputs.files != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-og-image.mjs ${{ steps.changed.outputs.files }}

      - name: Commit generated images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(find blog -name '*.png' 2>/dev/null) 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: generate OG images for blog posts [skip ci]"
          git push
